<!doctype html>
<html lang="zh-CN" data-lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draftelier — 渲染语言档案</title>
  <meta name="description" content="Draftelier Atelier — 上传一张照片，让它穿上十六种高定手稿的渲染语言。" />
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <a class="brand" href="#top">
      <img src="assets/logo.png" alt="Draftelier" />
      <span>Draftelier</span>
    </a>

    <nav class="top-links">
      <a href="#atelier" data-i18n="nav.atelier">工坊</a>
    </nav>

    <div class="lang-toggle" role="group" aria-label="Language">
      <button data-lang="zh" class="active" type="button">中</button>
      <span class="sep">/</span>
      <button data-lang="en" type="button">EN</button>
    </div>
  </div>

  <!-- HEROMASTHEAD (ZIMA-style framed card) -->
  <main class="page">
    <section id="top" class="masthead">
      <div class="framed-card">

        <div class="wordmark-wrap">
          <svg class="wordmark" viewBox="0 0 1400 320" preserveAspectRatio="xMidYMid meet" aria-label="DRAFTELIER">
            <defs>
              <linearGradient id="inkGrad" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#0a0a0a"/>
                <stop offset="1" stop-color="#2a2a2a"/>
              </linearGradient>
              <pattern id="collage" x="0" y="0" width="1400" height="320" patternUnits="userSpaceOnUse">
                <rect width="1400" height="320" fill="#0d0d0d"/>
                <!-- painterly collage blocks -->
                <rect x="0"    y="0"   width="200" height="320" fill="#2d1c10"/>
                <rect x="200"  y="0"   width="180" height="320" fill="#6b3c1c"/>
                <rect x="380"  y="0"   width="220" height="320" fill="#a67a3f"/>
                <rect x="600"  y="0"   width="180" height="320" fill="#c9a26b"/>
                <rect x="780"  y="0"   width="200" height="320" fill="#4a3420"/>
                <rect x="980"  y="0"   width="200" height="320" fill="#7a4b28"/>
                <rect x="1180" y="0"   width="220" height="320" fill="#1a1208"/>
                <!-- organic painterly marks -->
                <circle cx="150" cy="110" r="80"  fill="#c9a26b" opacity=".55"/>
                <circle cx="420" cy="220" r="110" fill="#2d1c10" opacity=".6"/>
                <circle cx="700" cy="90"  r="70"  fill="#f2ecdc" opacity=".45"/>
                <circle cx="920" cy="240" r="90"  fill="#a67a3f" opacity=".55"/>
                <circle cx="1220" cy="150" r="120" fill="#6b3c1c" opacity=".6"/>
                <!-- brushed horizontal strokes -->
                <rect x="0" y="140" width="1400" height="18" fill="#f2ecdc" opacity=".12"/>
                <rect x="0" y="200" width="1400" height="6"  fill="#0a0a0a" opacity=".28"/>
                <rect x="0" y="80"  width="1400" height="4"  fill="#a67a3f" opacity=".5"/>
              </pattern>
            </defs>
            <text x="700" y="232" text-anchor="middle"
                  font-family="Cormorant Garamond, serif"
                  font-weight="500"
                  font-size="300"
                  textLength="1320" lengthAdjust="spacingAndGlyphs"
                  fill="url(#collage)">DRAFTELIER</text>
          </svg>
        </div>

        <!-- Marquee gallery strip — images configured in assets/gallery-config.js -->
        <div class="mq-strip">
          <div class="mq-track" id="mq-track" role="region" aria-label="Gallery"></div>
        </div>

      </div>
    </section>

    <!-- ATELIER -->
    <section id="atelier" class="section atelier">
      <div class="atelier-grid">

        <!-- 01 · Upload -->
        <div class="block atelier-upload">
          <div class="block-head">
            <span class="bnum">01</span>
            <span class="blab" data-i18n="atelier.upload">上传照片</span>
            <button id="dz-clear" class="text-btn" hidden data-i18n="atelier.clear">清空</button>
          </div>

          <label id="dropzone" class="dropzone" for="file-input">
            <input id="file-input" type="file" accept="image/*" hidden />
            <div class="dz-empty">
              <svg class="dz-icon" viewBox="0 0 48 48" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.1">
                <rect x="6" y="10" width="36" height="28" />
                <path d="M6 32 L18 22 L26 30 L34 22 L42 30" />
                <circle cx="32" cy="18" r="2.5" />
              </svg>
              <div class="dz-title" data-i18n="atelier.dz.title">将照片拖拽到此处</div>
              <div class="dz-sub" data-i18n="atelier.dz.sub">或点击选择 · JPG / PNG</div>
            </div>
            <img id="dz-preview" class="dz-preview" alt="" />
          </label>
        </div>

        <!-- 02 · 渲染语言 (full-grid, no scroll) -->
        <div class="block atelier-styles">
          <div class="block-head">
            <span class="bnum">02</span>
            <span class="blab" data-i18n="atelier.pick">选择渲染语言</span>
            <span class="current-label" id="current-style-label">—</span>
          </div>
          <div id="style-rail" class="style-rail"></div>
        </div>

        <!-- 03 · Preview -->
        <div class="block atelier-poster">
          <div class="block-head">
            <span class="bnum">03</span>
            <span class="blab" data-i18n="atelier.preview">即时预览</span>
            <div class="poster-actions">
              <div class="aspect-toggle" role="group" aria-label="Aspect">
                <button type="button" data-aspect="auto" class="active">AUTO</button>
                <button type="button" data-aspect="portrait">竖</button>
                <button type="button" data-aspect="landscape">横</button>
              </div>
              <button id="share-poster" class="text-btn" type="button" hidden>分享 ↗</button>
              <button id="download-poster" class="text-btn" hidden data-i18n="atelier.download">下载 PNG ↓</button>
            </div>
          </div>
          <div id="ai-status" class="ai-status" hidden></div>
          <div class="poster-frame">
            <canvas id="poster-canvas" width="1440" height="1800"></canvas>
            <button id="generate-ai" class="ai-generate-center" type="button">AI 绘图生成</button>
            <div class="poster-placeholder" id="poster-placeholder">
              <div class="ph-line"></div>
              <p>
                <span data-i18n="atelier.ph.main">上传照片 & 选择一种风格</span><br/>
                <span class="small" data-i18n="atelier.ph.sub">此处将生成一张编辑式海报</span>
              </p>
              <div class="ph-line"></div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <footer class="footer">
      <div class="inner">
        <span data-i18n="footer.c">© <span id="year"></span> Draftelier 渲染语言档案</span>
        <span data-i18n="footer.edition">Vol. 01 — 静态版</span>
      </div>
    </footer>

  </main>

  <!-- MODAL -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="panel" role="dialog" aria-modal="true">
      <button class="close" aria-label="Close" data-i18n="modal.close">关闭 ✕</button>
      <div class="body" id="modal-body"></div>
    </div>
  </div>

  <script src="assets/styles-data.js"></script>
  <script src="assets/gallery-config.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
