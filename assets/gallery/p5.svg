<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 294">
  <rect width="210" height="294" fill="#f4efe3"/>
  <!-- proportion grid -->
  <g stroke="#1a1510" stroke-width="0.6" opacity="0.4">
    <!-- verticals -->
    <line x1="35" y1="20" x2="35" y2="274"/>
    <line x1="70" y1="20" x2="70" y2="274"/>
    <line x1="105" y1="20" x2="105" y2="274"/>
    <line x1="140" y1="20" x2="140" y2="274"/>
    <line x1="175" y1="20" x2="175" y2="274"/>
    <!-- horizontals -->
    <line x1="20" y1="50" x2="190" y2="50"/>
    <line x1="20" y1="97" x2="190" y2="97"/>
    <line x1="20" y1="147" x2="190" y2="147"/>
    <line x1="20" y1="197" x2="190" y2="197"/>
    <line x1="20" y1="247" x2="190" y2="247"/>
  </g>
  <!-- figure overlay -->
  <g stroke="#0b0b0b" stroke-width="1.4" fill="none" stroke-linecap="round">
    <ellipse cx="105" cy="56" rx="10" ry="12"/>
    <line x1="105" y1="68" x2="105" y2="97"/>
    <line x1="75" y1="84" x2="135" y2="84"/>
    <line x1="75" y1="84" x2="68" y2="130"/>
    <line x1="135" y1="84" x2="142" y2="130"/>
    <line x1="92" y1="97" x2="80" y2="147"/>
    <line x1="118" y1="97" x2="130" y2="147"/>
    <line x1="80" y1="147" x2="72" y2="247"/>
    <line x1="130" y1="147" x2="138" y2="247"/>
  </g>
  <!-- ruler marks + labels -->
  <g fill="#a67a3f" font-family="monospace" font-size="7" letter-spacing="0">
    <text x="14" y="53">①</text>
    <text x="14" y="100">②</text>
    <text x="14" y="150">③</text>
    <text x="14" y="200">④</text>
    <text x="14" y="250">⑤</text>
  </g>
  <text x="105" y="288" text-anchor="middle" font-family="serif" font-size="7.5" fill="#a67a3f" letter-spacing="3">PROPORTION GRID</text>
</svg>
